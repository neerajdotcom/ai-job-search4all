<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Job Search Dashboard{% endblock %}</title>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/">Job Search Dashboard</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/runs">Runs</a>
      <a href="/kanban">Pipeline</a>
      <a href="/trigger">Trigger</a>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/dashboard.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.initThemeToggle) window.initThemeToggle();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
