name: Job Search Pipeline

on:
  schedule:
    # Once daily to stay within Gemini's free-tier (~20 calls/day).
    - cron: "0 1 * * 1-5"   # 6:30 AM IST (01:00 UTC), Mon–Fri
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no email, no DOCX output)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      no_dedup:
        description: "Skip dedup — re-score all jobs regardless of prior runs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: job-search-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    name: Scrape → Score → Optimize → Digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
      GMAIL_USER:          ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
      DIGEST_RECIPIENT:    ${{ secrets.DIGEST_RECIPIENT }}
      # Default off in CI: 4/5 target boards (Naukri shell, Indeed/Cloudflare,
      # Foundit/Akamai, Wellfound/DataDome) hard-block the datacenter runner and
      # yield 0 rows for ~100s of wasted crawl time. crawl4ai stays available for
      # local/residential-IP runs via `ENABLE_CRAWL4AI=true python main.py`
      # (Instahyre is the one board that isn't anti-bot-walled — tune it there).
      ENABLE_CRAWL4AI:     "false"
      # Default off: scraper/ats_scraper.py's ATS company boards (Greenhouse/
      # Lever/Ashby/Workable) are a hand-picked list from the original template
      # profile. Customize that file's company lists to your own target
      # employers, then flip this to "true" — see README "Deploy your own copy".
      ENABLE_ATS_SCRAPING: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium (crawl4ai)
        run: |
          # crawl4ai drives a headless Chromium via Playwright. Best-effort:
          # the crawl4ai sources are fail-open, so the pipeline still runs the
          # Adzuna + ATS path if the browser install fails.
          python -m playwright install --with-deps chromium || true

      - name: Ensure LibreOffice (DOCX → PDF renderer)
        run: |
          # Preinstalled on ubuntu-latest, so this is usually a no-op; install
          # the writer component only if soffice is somehow missing. The pipeline
          # falls back to DOCX if it's absent, so this step is best-effort.
          command -v soffice >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y libreoffice-writer
          soffice --version || true

      - name: Verify profile is set up
        run: |
          if [ ! -f candidate_profile/config.yaml ]; then
            echo "ERROR: candidate_profile/config.yaml missing."
            echo "Run 'python setup_profile.py --resume your_resume.docx' locally"
            echo "and commit the result before enabling scheduled runs."
            exit 1
          fi
          echo "Profile found."

      - name: Run pipeline
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.no_dedup }}" = "true" ] && ARGS="$ARGS --no-dedup"
          python main.py $ARGS

      - name: Commit run snapshot
        if: always()
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/runs/ data/tracker.json
          git add data/weekly_report_*.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new run snapshot or tracker change to commit."
          else
            git commit -m "data: add run snapshot $(date -u +%Y%m%dT%H%M%SZ) [skip ci]"
            git push
          fi

      - name: Upload outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-outputs-${{ github.run_number }}
          path: outputs/
          retention-days: 7
          if-no-files-found: ignore

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: run-pipeline
    if: failure()

    steps:
      - name: Send failure notification email
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT:   ${{ secrets.DIGEST_RECIPIENT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'EOF'
          import os, smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          gmail_user    = os.environ["GMAIL_USER"]
          gmail_pass    = os.environ["GMAIL_APP_PASSWORD"]
          recipient     = os.environ["DIGEST_RECIPIENT"]
          run_url       = os.environ["RUN_URL"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = "⚠️ Job Search Pipeline Failed"
          msg["From"]    = gmail_user
          msg["To"]      = recipient

          html = f"""
          <div style="font-family:system-ui,sans-serif;max-width:600px;margin:0 auto;padding:24px;">
            <div style="background:#7f1d1d;padding:16px 24px;border-radius:8px 8px 0 0;">
              <h2 style="color:#fff;margin:0;">Pipeline Run Failed</h2>
            </div>
            <div style="background:#fff;border:1px solid #e5e7eb;border-top:none;
                        padding:24px;border-radius:0 0 8px 8px;">
              <p style="color:#374151;">
                The <strong>Job Search Pipeline</strong> failed during a scheduled run.<br>
                No digest email was sent for this cycle.
              </p>
              <p style="margin-top:20px;">
                <a href="{run_url}"
                   style="background:#2563eb;color:#fff;padding:10px 20px;border-radius:6px;
                          text-decoration:none;font-weight:600;">
                  View Run Logs →
                </a>
              </p>
              <p style="color:#9ca3af;font-size:12px;margin-top:24px;">
                Sent by job-search-agent · GitHub Actions
              </p>
            </div>
          </div>
          """

          msg.attach(MIMEText(html, "html", "utf-8"))

          with smtplib.SMTP("smtp.gmail.com", 587) as smtp:
              smtp.ehlo()
              smtp.starttls()
              smtp.login(gmail_user, gmail_pass)
              smtp.sendmail(gmail_user, recipient, msg.as_bytes())

          print(f"Failure notification sent to {recipient}")
          EOF
